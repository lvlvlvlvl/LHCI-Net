# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: D:/bladeThird/aug # dataset root dir
train: train # train images (relative to 'path') 118287 images
val: val # val images (relative to 'path') 5000 images
test: test # 20288 of 40670 images, submit to https://competitions.codalab.org/competitions/20794

# Classes
nc: 4  # 类别数量
names:
  0: Edge erosion
  1: Coating defects
  2: Damage
  3: Edge damage
